<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trial Query Engine</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17211f;
      --muted: #65716e;
      --line: #dce5e2;
      --bg: #f6f2ea;
      --panel: #fffdf8;
      --accent: #24594d;
      --accent-2: #c9793d;
      --danger: #9d2f2f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(circle at top left, #e7f0ed 0, transparent 35%), var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      padding: 32px clamp(18px, 4vw, 56px) 20px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 8px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(34px, 6vw, 72px);
      letter-spacing: -0.05em;
      line-height: 0.95;
    }

    header p { margin: 0; color: var(--muted); max-width: 760px; }

    main {
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      gap: 18px;
      padding: 20px clamp(18px, 4vw, 56px) 42px;
    }

    section, aside {
      background: color-mix(in srgb, var(--panel) 92%, white);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 16px 45px rgb(23 33 31 / 0.08);
    }

    aside { padding: 20px; align-self: start; }
    section { padding: 22px; }

    h2 {
      margin: 0 0 14px;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
    }

    label { display: block; margin: 14px 0 6px; font-weight: 700; font-size: 14px; }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 13px;
      background: white;
      color: var(--ink);
      font: inherit;
    }

    textarea { min-height: 128px; resize: vertical; }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      background: var(--accent);
      color: white;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .secondary { background: #e9ddd0; color: var(--ink); }

    .row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 16px; }
    .pill { display: inline-flex; align-items: center; gap: 8px; border: 1px solid var(--line); border-radius: 999px; padding: 8px 10px; color: var(--muted); font-size: 13px; }
    .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--danger); }
    .dot.ok { background: #2f8b57; }

    #status { margin-top: 14px; color: var(--muted); font-size: 14px; }
    #status.error { color: var(--danger); }
    #status.ok { color: var(--accent); }

    .answer {
      min-height: 180px;
      white-space: pre-wrap;
      line-height: 1.6;
      padding: 18px;
      border-radius: 18px;
      background: #f3eee4;
      border: 1px solid #e5d8ca;
    }

    .sources {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .source-card {
      border: 1px solid var(--line);
      border-left: 5px solid var(--accent-2);
      border-radius: 16px;
      padding: 14px;
      background: white;
    }

    .source-card h3 { margin: 0 0 6px; font-size: 16px; }
    .source-card p { margin: 8px 0 0; color: var(--muted); line-height: 1.5; }
    .meta { color: var(--muted); font-size: 13px; display: flex; gap: 10px; flex-wrap: wrap; }
    .latency { color: var(--muted); font-size: 13px; margin-top: 10px; }
    .links { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    .links a { color: var(--accent); font-weight: 700; text-decoration: none; }

    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Trial Query Engine</h1>
    <p>Ask grounded questions over ingested ClinicalTrials.gov records. Answers stream from the backend and show retrieved source chunks for traceability.</p>
  </header>

  <main>
    <aside>
      <h2>Session</h2>
      <form id="loginForm">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <div class="actions">
          <button type="submit" id="loginButton">Login</button>
          <button type="button" class="secondary" id="clearTokenButton">Forget token</button>
        </div>
      </form>

      <div class="actions">
        <span class="pill"><span id="authDot" class="dot"></span><span id="authText">Not logged in</span></span>
      </div>

      <div id="status">Ready.</div>
      <div class="links">
        <a href="/docs" target="_blank" rel="noreferrer">API docs</a>
        <a href="/health" target="_blank" rel="noreferrer">Health</a>
      </div>
    </aside>

    <section>
      <h2>Ask A Trial Question</h2>
      <form id="queryForm">
        <label for="question">Question</label>
        <textarea id="question" name="question" required>What eligibility criteria appear across the available clinical trials?</textarea>

        <div class="row">
          <div>
            <label for="phase">Phase filter</label>
            <input id="phase" name="phase" placeholder="PHASE3">
          </div>
          <div>
            <label for="status">Status filter</label>
            <input id="statusFilter" name="status" placeholder="RECRUITING">
          </div>
        </div>

        <div class="row">
          <div>
            <label for="condition">Condition filter</label>
            <input id="condition" name="condition" placeholder="Breast Cancer">
          </div>
          <div>
            <label for="topK">Top K</label>
            <input id="topK" name="topK" type="number" min="1" max="20" value="5">
          </div>
        </div>

        <div class="actions">
          <button type="submit" id="askButton">Ask</button>
        </div>
      </form>

      <h2 style="margin-top: 24px;">Answer</h2>
      <div id="answer" class="answer">Answer stream will appear here.</div>
      <div id="latency" class="latency"></div>

      <h2 style="margin-top: 24px;">Retrieved Sources</h2>
      <div id="sources" class="sources"></div>
    </section>
  </main>

  <script>
    let accessToken = null;

    const loginForm = document.getElementById("loginForm");
    const queryForm = document.getElementById("queryForm");
    const loginButton = document.getElementById("loginButton");
    const askButton = document.getElementById("askButton");
    const clearTokenButton = document.getElementById("clearTokenButton");
    const statusEl = document.getElementById("status");
    const authDot = document.getElementById("authDot");
    const authText = document.getElementById("authText");
    const answerEl = document.getElementById("answer");
    const sourcesEl = document.getElementById("sources");
    const latencyEl = document.getElementById("latency");

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = type;
    }

    function setAuthenticated(isAuthenticated) {
      authDot.classList.toggle("ok", isAuthenticated);
      authText.textContent = isAuthenticated ? "Logged in" : "Not logged in";
    }

    function resetQueryUi() {
      answerEl.textContent = "";
      sourcesEl.innerHTML = "";
      latencyEl.textContent = "";
    }

    function renderRetrievedChunks(chunks) {
      sourcesEl.innerHTML = "";
      if (!chunks.length) {
        sourcesEl.innerHTML = "<p>No chunks retrieved.</p>";
        return;
      }

      for (const chunk of chunks) {
        const card = document.createElement("article");
        const title = document.createElement("h3");
        const meta = document.createElement("div");
        const nct = document.createElement("span");
        const chunkId = document.createElement("span");
        const chunkSource = document.createElement("span");
        const distance = document.createElement("span");
        const scores = document.createElement("span");
        const text = document.createElement("p");

        card.className = "source-card";
        meta.className = "meta";
        title.textContent = chunk.title;
        nct.textContent = `NCT: ${chunk.nct_id}`;
        chunkId.textContent = `Chunk: ${chunk.chunk_id}`;
        chunkSource.textContent = `Section: ${chunk.chunk_source || "unknown"}`;
        distance.textContent = `Distance: ${Number(chunk.distance).toFixed(4)}`;
        scores.textContent = `Scores: blended ${Number(chunk.blended_score ?? 0).toFixed(3)}, semantic ${Number(chunk.semantic_score ?? 0).toFixed(3)}, keyword ${Number(chunk.keyword_score ?? 0).toFixed(3)}`;
        text.textContent = chunk.chunk_text;

        meta.append(nct, chunkId, chunkSource, distance, scores);
        card.append(title, meta, text);
        sourcesEl.appendChild(card);
      }
    }

    function parseSseBlock(block) {
      const lines = block.split("\n");
      let event = "message";
      const dataLines = [];

      for (const line of lines) {
        if (line.startsWith("event:")) {
          event = line.slice(6).trim();
        } else if (line.startsWith("data:")) {
          dataLines.push(line.slice(5).trimStart());
        }
      }

      if (!dataLines.length) return null;
      return { event, data: JSON.parse(dataLines.join("\n")) };
    }

    function handleSseEvent(event, data) {
      if (event === "retrieval") {
        renderRetrievedChunks(data.chunks || []);
        setStatus(`Retrieved ${(data.chunks || []).length} source chunk(s).`, "ok");
      } else if (event === "token") {
        answerEl.textContent += data.text || "";
      } else if (event === "done") {
        const latency = data.latency_ms || {};
        latencyEl.textContent = `Latency: embed ${latency.embed ?? "?"}ms, retrieval ${latency.retrieval ?? "?"}ms, llm ${latency.llm ?? "?"}ms`;
        setStatus("Answer complete and logged to chat history.", "ok");
      } else if (event === "error") {
        setStatus(data.message || "Stream error.", "error");
      }
    }

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      loginButton.disabled = true;
      setStatus("Logging in...");

      try {
        const body = new URLSearchParams();
        body.set("username", document.getElementById("email").value);
        body.set("password", document.getElementById("password").value);

        const response = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body
        });

        if (!response.ok) {
          throw new Error(`Login failed (${response.status})`);
        }

        const data = await response.json();
        accessToken = data.access_token;
        setAuthenticated(true);
        setStatus("Login ok. You can ask a question now.", "ok");
      } catch (error) {
        accessToken = null;
        setAuthenticated(false);
        setStatus(error.message, "error");
      } finally {
        loginButton.disabled = false;
      }
    });

    clearTokenButton.addEventListener("click", () => {
      accessToken = null;
      setAuthenticated(false);
      setStatus("Token cleared. Login again to query.");
    });

    queryForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!accessToken) {
        setStatus("Login first.", "error");
        return;
      }

      resetQueryUi();
      askButton.disabled = true;
      answerEl.textContent = "";
      setStatus("Sending query...");

      const payload = {
        question: document.getElementById("question").value,
        top_k: Number(document.getElementById("topK").value || 5)
      };

      for (const [key, id] of [["phase", "phase"], ["status", "statusFilter"], ["condition", "condition"]]) {
        const value = document.getElementById(id).value.trim();
        if (value) payload[key] = value;
      }

      try {
        const response = await fetch("/query", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${accessToken}`
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok || !response.body) {
          throw new Error(`Query failed (${response.status})`);
        }

        setStatus("Streaming answer...");
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const blocks = buffer.split("\n\n");
          buffer = blocks.pop() || "";
          for (const block of blocks) {
            const parsed = parseSseBlock(block);
            if (parsed) handleSseEvent(parsed.event, parsed.data);
          }
        }

        if (buffer.trim()) {
          const parsed = parseSseBlock(buffer);
          if (parsed) handleSseEvent(parsed.event, parsed.data);
        }
      } catch (error) {
        setStatus(error.message, "error");
      } finally {
        askButton.disabled = false;
      }
    });
  </script>
</body>
</html>
